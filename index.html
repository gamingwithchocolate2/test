<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>our chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0b0c; color: #e4e4e7; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 480px; height: 100vh; background: #121214; display: flex; flex-direction: column; width: 100vw; }
        
        .header { padding: 16px; background: #1a1a1e; border-bottom: 1px solid #27272a; display: flex; flex-direction: column; gap: 4px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; }
        
        .members-indicator { font-size: 12px; color: #a1a1aa; background: #27272a; padding: 4px 8px; border-radius: 12px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .members-indicator::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
        .member-list { font-size: 11px; color: #71717a; margin: 0; padding-top: 2px; }

        .setup-screen { padding: 24px; display: flex; flex-direction: column; gap: 16px; flex-grow: 1; justify-content: center; }
        input[type="text"] { background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        button { background: #3b82f6; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; }
        
        .messages { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #0b0b0c; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .msg.me { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: #27272a; color: #e4e4e7; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .input-bar { padding: 12px; background: #1a1a1e; border-top: 1px solid #27272a; display: flex; align-items: center; gap: 8px; }
        .input-bar input { flex-grow: 1; background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="header-top">
            <h1>our chat</h1>
            <div id="members-count" class="members-indicator hidden">0 online</div>
        </div>
        <div id="members-names" class="member-list hidden"></div>
    </div>
    
    <div id="setup-view" class="setup-screen">
        <input type="text" id="username-input" placeholder="Enter your nickname">
        <input type="text" id="room-input" placeholder="Enter secret room name">
        <button id="join-btn">Join Chat Room</button>
    </div>

    <div id="chat-view" class="chat-screen hidden" style="display: flex; flex-direction: column; flex-grow: 1;">
        <div id="messages-container" class="messages"></div>
        <div class="input-bar">
            <input type="text" id="text-input" placeholder="Message">
            <button id="send-btn" style="background: none; color: #3b82f6; font-size: 18px; border:none; cursor:pointer;">➔</button>
        </div>
    </div>
</div>

<script>
    let roomKey = '';
    let myUsername = 'User';
    let chatHistory = [];
    const myId = Math.random().toString(36).substr(2, 9);

    const setupView = document.getElementById('setup-view'), chatView = document.getElementById('chat-view');
    const messagesContainer = document.getElementById('messages-container'), textInput = document.getElementById('text-input');
    const joinBtn = document.getElementById('join-btn');
    const countTag = document.getElementById('members-count'), namesTag = document.getElementById('members-names');

    // Cleaned public Key-Value endpoint bucket
    const bucketUrl = "https://kvdb.io/v3mN98Vf6H7v89bNf6vH89/";

    joinBtn.onclick = () => {
        const userIn = document.getElementById('username-input').value.trim();
        const roomIn = document.getElementById('room-input').value.trim();
        if (!userIn || !roomIn) return alert('Fill out both boxes first');
        
        myUsername = userIn;
        // Strip out bad characters directly so room codes match 1:1 across devices
        roomKey = 'room_' + roomIn.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        
        setupView.classList.add('hidden');
        chatView.classList.remove('hidden');
        countTag.classList.remove('hidden');
        namesTag.classList.remove('hidden');
        
        syncChat();
        syncMembers();
        
        setInterval(syncChat, 2000);   
        setInterval(syncMembers, 4000); 
    };

    async function syncChat() {
        try {
            const res = await fetch(`${bucketUrl}${roomKey}_msgs`);
            if (!res.ok) return;
            const data = await res.json();
            
            if (data && JSON.stringify(data) !== JSON.stringify(chatHistory)) {
                chatHistory = data;
                renderMessages();
            }
        } catch (e) {}
    }

    async function syncMembers() {
        try {
            let membersMap = {};
            const res = await fetch(`${bucketUrl}${roomKey}_mbrs`);
            if (res.ok) {
                const text = await res.text();
                if(text && text !== "null") membersMap = JSON.parse(text);
            }

            membersMap[myId] = { name: myUsername, lastSeen: Date.now() };

            const now = Date.now();
            for (let id in membersMap) {
                if (now - membersMap[id].lastSeen > 12000) delete membersMap[id];
            }

            // Fixed method to PUT so it successfully updates online status globally
            await fetch(`${bucketUrl}${roomKey}_mbrs`, {
                method: 'PUT',
                body: JSON.stringify(membersMap)
            });

            const currentUsers = Object.values(membersMap);
            countTag.textContent = `${currentUsers.length} online`;
            namesTag.textContent = currentUsers.map(u => u.name).join(', ');

        } catch(e) {}
    }

    async function send() {
        const val = textInput.value.trim();
        if (!val) return;

        textInput.value = '';

        try {
            const res = await fetch(`${bucketUrl}${roomKey}_msgs`);
            if (res.ok) {
                const text = await res.text();
                if(text && text !== "null") chatHistory = JSON.parse(text);
            }
        } catch(e) {}
        
        chatHistory.push({ sender: myId, text: val, name: myUsername });
        renderMessages();

        if (chatHistory.length > 30) chatHistory.shift();

        try {
            // Fixed method to PUT to guarantee messages successfully push to her phone
            await fetch(`${bucketUrl}${roomKey}_msgs`, {
                method: 'PUT',
                body: JSON.stringify(chatHistory)
            });
        } catch (e) {}
    }

    function renderMessages() {
        messagesContainer.innerHTML = '';
        chatHistory.forEach(msg => {
            const bubble = document.createElement('div');
            const side = msg.sender === myId ? 'me' : 'them';
            bubble.className = `msg ${side}`;
            bubble.innerText = side === 'them' ? `${msg.name}: ${msg.text}` : msg.text;
            messagesContainer.appendChild(bubble);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    document.getElementById('send-btn').onclick = send;
    textInput.onkeypress = e => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
