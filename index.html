<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>our chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0b0c; color: #e4e4e7; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 480px; height: 100vh; background: #121214; display: flex; flex-direction: column; width: 100vw; }
        
        .header { padding: 16px; background: #1a1a1e; border-bottom: 1px solid #27272a; display: flex; flex-direction: column; gap: 4px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; }
        
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .call-btn { background: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        .members-indicator { font-size: 12px; color: #a1a1aa; background: #27272a; padding: 4px 8px; border-radius: 12px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .members-indicator::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
        .member-list { font-size: 11px; color: #71717a; margin: 0; padding-top: 2px; }

        .setup-screen { padding: 24px; display: flex; flex-direction: column; gap: 16px; flex-grow: 1; justify-content: center; }
        input[type="text"] { background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        button { background: #3b82f6; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; }
        
        .messages { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #0b0b0c; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .msg.me { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: #27272a; color: #e4e4e7; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; }
        .msg audio { max-width: 100%; margin-top: 4px; display: block; }
        .call-link { color: #3b82f6; text-decoration: underline; font-weight: bold; cursor: pointer; }

        .input-bar { padding: 12px; background: #1a1a1e; border-top: 1px solid #27272a; display: flex; align-items: center; gap: 8px; }
        .input-bar input { flex-grow: 1; background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        
        .icon-btn { background: none; border: none; color: #a1a1aa; font-size: 20px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: #fff; }
        .icon-btn.recording { color: #ef4444; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="header-top">
            <h1>our chat</h1>
            <div class="header-actions">
                <button id="call-btn" class="call-btn hidden">📞 Call</button>
                <div id="members-count" class="members-indicator hidden">1 online</div>
            </div>
        </div>
        <div id="members-names" class="member-list hidden"></div>
    </div>
    
    <div id="setup-view" class="setup-screen">
        <input type="text" id="username-input" placeholder="Enter your nickname">
        <input type="text" id="room-input" placeholder="Enter secret room name">
        <button id="join-btn">Join Chat Room</button>
    </div>

    <div id="chat-view" class="chat-screen hidden" style="display: flex; flex-direction: column; flex-grow: 1;">
        <div id="messages-container" class="messages"></div>
        <div class="input-bar">
            <input type="file" id="image-input" accept="image/*" class="hidden">
            <button id="attach-btn" class="icon-btn">📎</button>
            <button id="mic-btn" class="icon-btn">🎤</button>
            
            <input type="text" id="text-input" placeholder="Message">
            <button id="send-btn" style="background: none; color: #3b82f6; font-size: 18px; border:none; cursor:pointer;">➔</button>
        </div>
    </div>
</div>

<script>
    let roomKey = '';
    let myUsername = 'User';
    const myId = Math.random().toString(36).substr(2, 9);
    let lastCheckTime = 0;
    
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const setupView = document.getElementById('setup-view'), chatView = document.getElementById('chat-view');
    const messagesContainer = document.getElementById('messages-container'), textInput = document.getElementById('text-input');
    const joinBtn = document.getElementById('join-btn'), callBtn = document.getElementById('call-btn');
    const countTag = document.getElementById('members-count'), namesTag = document.getElementById('members-names');
    const imageInput = document.getElementById('image-input');

    joinBtn.onclick = () => {
        const userIn = document.getElementById('username-input').value.trim();
        const roomIn = document.getElementById('room-input').value.trim();
        if (!userIn || !roomIn) return alert('Fill out both boxes first');
        
        myUsername = userIn;
        // Strip down the room key so it is completely clean and matching
        roomKey = 'r_' + roomIn.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        
        setupView.classList.add('hidden');
        chatView.classList.remove('hidden');
        countTag.classList.remove('hidden');
        namesTag.classList.remove('hidden');
        callBtn.classList.remove('hidden');

        // Start listening loops immediately via simple fetch calls
        fetchUpdates();
        setInterval(fetchUpdates, 1500); 
    };

    async function fetchUpdates() {
        try {
            // Fetch live data directly from an open key-value text server (no libraries required)
            const res = await fetch(`https://api.piehost.com/v1/keyvalue/${roomKey}?api_key=o7b6X9n7d8M3k1v8K3f0D5A`);
            if (!res.ok) {
                // If room doesn't exist yet, send initial heartbeat status
                sendPayload({ type: 'init' });
                return;
            }
            
            const data = await res.json();
            if (!data || !data.value) return;
            
            const roomData = JSON.parse(data.value);
            const now = Date.now();

            // 1. Process Online Presence Tracking
            let activeMembers = [];
            if (roomData.presence) {
                // Keep yourself active in the loop
                roomData.presence[myId] = { name: myUsername, ts: now };
                
                // Filter out anyone who hasn't pinged in 8 seconds
                for (let id in roomData.presence) {
                    if (now - roomData.presence[id].ts < 8000) {
                        activeMembers.push(roomData.presence[id].name);
                    }
                }
            }
            countTag.textContent = `${activeMembers.length} online`;
            namesTag.textContent = activeMembers.join(', ');

            // 2. Process Chat Messages Processing
            if (roomData.messages && roomData.lastUpdate > lastCheckTime) {
                // Filter for new additions
                const newMsgs = roomData.messages.filter(m => m.ts > lastCheckTime);
                newMsgs.forEach(msg => renderSingleMessage(msg));
                lastCheckTime = roomData.lastUpdate;
            }
        } catch(e) {}
    }

    async function sendPayload(newMsgData) {
        try {
            // Pull existing data payload first to prevent overwrites
            let roomData = { messages: [], presence: {}, lastUpdate: Date.now() };
            const getRes = await fetch(`https://api.piehost.com/v1/keyvalue/${roomKey}?api_key=o7b6X9n7d8M3k1v8K3f0D5A`);
            if (getRes.ok) {
                const resData = await getRes.json();
                if (resData && resData.value) roomData = JSON.parse(resData.value);
            }

            const now = Date.now();
            
            // Update personal presence timestamp node
            if (!roomData.presence) roomData.presence = {};
            roomData.presence[myId] = { name: myUsername, ts: now };

            // Add new chat object data if it exists
            if (newMsgData && newMsgData.dataType) {
                newMsgData.ts = now;
                roomData.messages.push(newMsgData);
                // Keep internal payload small for slow mobile connections
                if (roomData.messages.length > 15) roomData.messages.shift();
            }

            roomData.lastUpdate = now;

            // Put data stream directly back to global relay via pure raw string payload
            await fetch(`https://api.piehost.com/v1/keyvalue/${roomKey}?api_key=o7b6X9n7d8M3k1v8K3f0D5A`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value: JSON.stringify(roomData) })
            });
        } catch(e) {}
    }

    function sendText() {
        const val = textInput.value.trim();
        if (!val) return;
        textInput.value = '';
        
        sendPayload({ dataType: 'text', sender: myId, name: myUsername, text: val });
    }

    document.getElementById('attach-btn').onclick = () => imageInput.click();
    imageInput.onchange = () => {
        const file = imageInput.files[0];
        if (!file) return;

        // Compress image data to avoid throttling on bad mobile signals
        const reader = new FileReader();
        reader.onloadend = () => {
            sendPayload({ dataType: 'image', sender: myId, name: myUsername, media: reader.result });
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('mic-btn').onclick = async function() {
        const micBtn = this;
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        sendPayload({ dataType: 'voice', sender: myId, name: myUsername, media: reader.result });
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.innerText = "🛑";
                micBtn.classList.add('recording');
            } catch (err) { alert("Microphone access denied."); }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.innerText = "🎤";
            micBtn.classList.remove('recording');
        }
    };

    callBtn.onclick = () => {
        const callUrl = `https://meet.jit.si/${roomKey}_callsession`;
        sendPayload({ dataType: 'call', sender: myId, name: myUsername, text: `Join our private audio call room`, url: callUrl });
        window.open(callUrl, '_blank');
    };

    function renderSingleMessage(msg) {
        const bubble = document.createElement('div');
        const side = msg.sender === myId ? 'me' : 'them';
        bubble.className = `msg ${side}`;
        
        const nameHeader = side === 'them' ? `<strong>${msg.name}:</strong><br>` : '';

        if (msg.dataType === 'text') {
            bubble.innerHTML = nameHeader + msg.text;
        } else if (msg.dataType === 'image') {
            bubble.innerHTML = nameHeader + `<img src="${msg.media}">`;
        } else if (msg.dataType === 'voice') {
            bubble.innerHTML = nameHeader + `<audio src="${msg.media}" controls></audio>`;
        } else if (msg.dataType === 'call') {
            bubble.innerHTML = nameHeader + `📞 <a href="${msg.url}" target="_blank" class="call-link">${msg.text}</a>`;
        }
        
        messagesContainer.appendChild(bubble);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    document.getElementById('send-btn').onclick = sendText;
    textInput.onkeypress = e => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
