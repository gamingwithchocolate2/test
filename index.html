<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>our chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0b0c; color: #e4e4e7; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 480px; height: 100vh; background: #121214; display: flex; flex-direction: column; width: 100vw; position: relative; }
        
        .header { padding: 16px; background: #1a1a1e; border-bottom: 1px solid #27272a; display: flex; flex-direction: column; gap: 4px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; }
        
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .call-btn { background: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        .members-indicator { font-size: 12px; color: #a1a1aa; background: #27272a; padding: 4px 8px; border-radius: 12px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .members-indicator::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
        .member-list { font-size: 11px; color: #71717a; margin: 0; padding-top: 2px; }

        .setup-screen { padding: 24px; display: flex; flex-direction: column; gap: 16px; flex-grow: 1; justify-content: center; }
        input[type="text"] { background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        button { background: #3b82f6; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; }
        
        .messages { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #0b0b0c; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .msg.me { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: #27272a; color: #e4e4e7; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; }
        .msg audio { max-width: 100%; margin-top: 4px; display: block; }
        .call-link { color: #3b82f6; text-decoration: underline; font-weight: bold; cursor: pointer; }

        .input-bar { padding: 12px; background: #1a1a1e; border-top: 1px solid #27272a; display: flex; align-items: center; gap: 8px; }
        .input-bar input { flex-grow: 1; background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        
        .icon-btn { background: none; border: none; color: #a1a1aa; font-size: 20px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: #fff; }
        .icon-btn.recording { color: #ef4444; animation: blink 1s infinite; }

        .call-overlay { position: absolute; top: 70px; left: 10px; right: 10px; height: 260px; background: #1a1a1e; border: 1px solid #3f3f46; border-radius: 12px; display: flex; flex-direction: column; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; }
        .call-overlay iframe { width: 100%; flex-grow: 1; border: none; }
        .call-overlay-bar { background: #27272a; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; color: #fff; }
        .close-call-btn { background: #ef4444; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="call-overlay" class="call-overlay hidden">
        <div class="call-overlay-bar">
            <span>🔴 Live Audio Room</span>
            <button id="close-call-btn" class="close-call-btn">Disconnect</button>
        </div>
        <iframe id="call-iframe" allow="microphone"></iframe>
    </div>

    <div class="header">
        <div class="header-top">
            <h1>our chat</h1>
            <div class="header-actions">
                <button id="call-btn" class="call-btn hidden">📞 Call</button>
                <div id="members-count" class="members-indicator hidden">1 online</div>
            </div>
        </div>
        <div id="members-names" class="member-list hidden"></div>
    </div>
    
    <div id="setup-view" class="setup-screen">
        <input type="text" id="username-input" placeholder="Enter your nickname">
        <input type="text" id="room-input" placeholder="Enter secret room name">
        <button id="join-btn">Join Chat Room</button>
    </div>

    <div id="chat-view" class="chat-screen hidden" style="display: flex; flex-direction: column; flex-grow: 1;">
        <div id="messages-container" class="messages"></div>
        <div class="input-bar">
            <input type="file" id="image-input" accept="image/*" class="hidden">
            <button id="attach-btn" class="icon-btn">📎</button>
            <button id="mic-btn" class="icon-btn">🎤</button>
            
            <input type="text" id="text-input" placeholder="Message">
            <button id="send-btn" style="background: none; color: #3b82f6; font-size: 18px; border:none; cursor:pointer;">➔</button>
        </div>
    </div>
</div>

<script>
    let roomKey = '';
    let myUsername = 'User';
    const myId = Math.random().toString(36).substr(2, 9);
    let eventSource = null;
    let knownMessages = new Set();
    let onlineUsers = {};

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const setupView = document.getElementById('setup-view'), chatView = document.getElementById('chat-view');
    const messagesContainer = document.getElementById('messages-container'), textInput = document.getElementById('text-input');
    const joinBtn = document.getElementById('join-btn'), callBtn = document.getElementById('call-btn');
    const countTag = document.getElementById('members-count'), namesTag = document.getElementById('members-names');
    const imageInput = document.getElementById('image-input');
    
    const callOverlay = document.getElementById('call-overlay'), callIframe = document.getElementById('call-iframe'), closeCallBtn = document.getElementById('close-call-btn');

    joinBtn.onclick = () => {
        const userIn = document.getElementById('username-input').value.trim();
        const roomIn = document.getElementById('room-input').value.trim();
        if (!userIn || !roomIn) return alert('Fill out both boxes first');
        
        myUsername = userIn;
        roomKey = 'stream_' + btoa(roomIn).replace(/[^a-zA-Z0-9]/g, '').toLowerCase().substr(0, 20);
        
        setupView.classList.add('hidden');
        chatView.classList.remove('hidden');
        countTag.classList.remove('hidden');
        namesTag.classList.remove('hidden');
        callBtn.classList.remove('hidden');
        
        startLiveStream();
        sendHeartbeat();
        setInterval(sendHeartbeat, 4000); // Send background presence ping every 4 seconds
        setInterval(checkPresenceExpiry, 2000); // Prune inactive connections locally
    };

    function startLiveStream() {
        if (eventSource) eventSource.close();

        // Establish a persistent Server-Sent Events stream link
        eventSource = new EventSource(`https://ntfy.sh/${roomKey}/sse`);

        eventSource.onmessage = (event) => {
            try {
                const entry = JSON.parse(event.data);
                if (!entry.message) return;
                
                const payload = JSON.parse(entry.message);
                
                if (payload.type === 'chat' && !knownMessages.has(payload.id)) {
                    knownMessages.add(payload.id);
                    renderSingleMessage(payload);
                } else if (payload.type === 'status') {
                    onlineUsers[payload.sender] = { name: payload.name, lastSeen: Date.now() };
                    updatePresenceUI();
                }
            } catch(e) {}
        };

        eventSource.onerror = () => {
            // Auto-reconnect instantly if phone network drops momentarily
            setTimeout(startLiveStream, 1000);
        };
    }

    function updatePresenceUI() {
        onlineUsers[myId] = { name: myUsername, lastSeen: Date.now() };
        const activeNames = Object.values(onlineUsers).map(u => u.name);
        countTag.textContent = `${activeNames.length} online`;
        namesTag.textContent = activeNames.join(', ');
    }

    function checkPresenceExpiry() {
        const now = Date.now();
        let changed = false;
        for (let id in onlineUsers) {
            if (id !== myId && now - onlineUsers[id].lastSeen > 10000) {
                delete onlineUsers[id];
                changed = true;
            }
        }
        if (changed) updatePresenceUI();
    }

    async function sendHeartbeat() {
        try {
            await fetch(`https://ntfy.sh/${roomKey}`, {
                method: 'POST',
                body: JSON.stringify({ type: 'status', sender: myId, name: myUsername })
            });
        } catch(e) {}
    }

    async function transmitPayload(payload) {
        try {
            await fetch(`https://ntfy.sh/${roomKey}`, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
        } catch (e) {}
    }

    function sendText() {
        const val = textInput.value.trim();
        if (!val) return;
        textInput.value = '';
        
        const msgId = Math.random().toString(36).substr(2, 9);
        const msgPayload = { type: 'chat', id: msgId, dataType: 'text', sender: myId, name: myUsername, text: val };

        knownMessages.add(msgId);
        renderSingleMessage(msgPayload);
        transmitPayload(msgPayload);
    }

    document.getElementById('attach-btn').onclick = () => imageInput.click();
    imageInput.onchange = async () => {
        const file = imageInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const uploadRes = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: formData });
            const uploadData = await uploadRes.json();
            const finalUrl = uploadData.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');

            const msgId = Math.random().toString(36).substr(2, 9);
            const msgPayload = { type: 'chat', id: msgId, dataType: 'image', sender: myId, name: myUsername, url: finalUrl };

            knownMessages.add(msgId);
            renderSingleMessage(msgPayload);
            transmitPayload(msgPayload);
        } catch (err) { alert("Failed to upload image."); }
    };

    document.getElementById('mic-btn').onclick = async function() {
        const micBtn = this;
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioFile = new File([audioBlob], 'voice.webm', { type: 'audio/webm' });
                    
                    const formData = new FormData();
                    formData.append('file', audioFile);

                    try {
                        const uploadRes = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: formData });
                        const uploadData = await uploadRes.json();
                        const finalUrl = uploadData.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');

                        const msgId = Math.random().toString(36).substr(2, 9);
                        const msgPayload = { type: 'chat', id: msgId, dataType: 'voice', sender: myId, name: myUsername, url: finalUrl };

                        knownMessages.add(msgId);
                        renderSingleMessage(msgPayload);
                        transmitPayload(msgPayload);
                    } catch(e) { alert("Failed to send voice note."); }
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.innerText = "🛑";
                micBtn.classList.add('recording');
            } catch (err) { alert("Microphone access denied."); }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.innerText = "🎤";
            micBtn.classList.remove('recording');
        }
    };

    function launchCallInterface() {
        const callRoomName = roomKey.substr(0, 15) + "_call";
        const callUrl = `https://meet.jit.si/${callRoomName}#config.startWithVideoMuted=true&config.startWithAudioMuted=false&config.prejoinPageEnabled=false`;
        
        callIframe.src = callUrl;
        callOverlay.classList.remove('hidden');
    }

    callBtn.onclick = () => {
        launchCallInterface();
        const msgId = Math.random().toString(36).substr(2, 9);
        const msgPayload = { type: 'chat', id: msgId, dataType: 'call', sender: myId, name: myUsername, text: `Started an audio room voice call.` };
        transmitPayload(msgPayload);
    };

    closeCallBtn.onclick = () => {
        callIframe.src = '';
        callOverlay.classList.add('hidden');
    };

    function renderSingleMessage(msg) {
        const bubble = document.createElement('div');
        const side = msg.sender === myId ? 'me' : 'them';
        bubble.className = `msg ${side}`;
        
        const nameHeader = side === 'them' ? `<strong>${msg.name}:</strong><br>` : '';

        if (msg.dataType === 'text') {
            bubble.innerHTML = nameHeader + msg.text;
        } else if (msg.dataType === 'image') {
            bubble.innerHTML = nameHeader + `<img src="${msg.url}">`;
        } else if (msg.dataType === 'voice') {
            bubble.innerHTML = nameHeader + `<audio src="${msg.url}" controls></audio>`;
        } else if (msg.dataType === 'call') {
            bubble.innerHTML = nameHeader + `📞 <span class="call-link" onclick="launchCallInterface()">${msg.text}</span>`;
        }
        
        messagesContainer.appendChild(bubble);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    document.getElementById('send-btn').onclick = sendText;
    textInput.onkeypress = e => { if(e.key === 'Enter') sendText(); };
</script>
</body>
</html>
